version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tradewise
      POSTGRES_PASSWORD: \
      POSTGRES_DB: tradewise
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - '6333:6333'
    volumes:
      - qdrant_data:/qdrant/storage

  market-engine:
    build: ../market-engine
    env_file: .env
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  gateway:
    build: ../gateway
    env_file: .env
    ports:
      - '8000:8000'
    depends_on:
      - postgres
      - redis
      - qdrant
    restart: unless-stopped

  web:
    build: ../web
    ports:
      - '3000:3000'
    depends_on:
      - gateway
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gateway
      - web
    restart: unless-stopped

volumes:
  pg_data:
  qdrant_data:
